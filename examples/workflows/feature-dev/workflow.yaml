id: feature-dev
name: Feature Development
harness: claude # Default harness for all steps; set codex or opencode to switch.
# model: <provider/model> # Optional: uncomment to pin a default model.

steps:
  - id: plan
    prompt_file: planner-agent.md
    next_step: implement
    requires:
      inputs: [task]

  - id: implement
    prompt_file: tackle-agent.md
    next_step: verify
    requires:
      inputs: [task, plan.plan]
      outputs: [summary]

  - id: verify
    prompt_file: review-agent.md
    next_step: done
    requires:
      inputs: [implement.summary]
