<svg width="100%" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-green  rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-purple .th  { fill: #3C3489; }
    .c-green  .th  { fill: #085041; }
    .c-amber  .th  { fill: #633806; }
  </style>
</defs>

<!-- ── START — double circle ── -->
<circle cx="44" cy="150" r="22" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
<circle cx="44" cy="150" r="13" fill="#2C2C2A"/>

<!-- Start → plan -->
<line x1="66" y1="150" x2="110" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── PLAN ── -->
<g class="c-purple">
  <rect x="110" y="124" width="110" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="165" y="150" text-anchor="middle" dominant-baseline="central">plan</text>
</g>

<!-- plan → implement -->
<line x1="220" y1="150" x2="264" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── IMPLEMENT ── -->
<g class="c-purple">
  <rect x="264" y="124" width="130" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="329" y="150" text-anchor="middle" dominant-baseline="central">implement</text>
</g>

<!-- implement → verify -->
<line x1="394" y1="150" x2="438" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── VERIFY ── -->
<g class="c-purple">
  <rect x="438" y="124" width="110" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="493" y="150" text-anchor="middle" dominant-baseline="central">verify</text>
</g>

<!-- Feedback loop: verify → implement (arc above) -->
<path d="M493 124 C493 64 329 64 329 124" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="411" y="58" text-anchor="middle">changes requested</text>

<!-- verify → done (bottom-right diagonal) -->
<path d="M548 176 L620 228" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="568" y="216">approved</text>

<!-- verify → human_intervention (top-right diagonal) -->
<path d="M548 124 L620 72" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="562" y="88">escalation</text>

<!-- ── DONE — double-ring terminal ── -->
<g class="c-green">
  <rect x="620" y="228" width="120" height="44" rx="22" stroke-width="2"/>
  <rect x="626" y="234" width="108" height="32" rx="18" fill="none" stroke-width="1.5" stroke="#085041"/>
  <text class="th" x="680" y="250" text-anchor="middle" dominant-baseline="central">done</text>
</g>

<!-- ── HUMAN INTERVENTION — double-ring terminal ── -->
<g class="c-amber">
  <rect x="620" y="28" width="236" height="44" rx="22" stroke-width="2"/>
  <rect x="626" y="34" width="224" height="32" rx="18" fill="none" stroke-width="1.5" stroke="#633806"/>
  <text class="th" x="738" y="50" text-anchor="middle" dominant-baseline="central">human_intervention</text>
</g>

</svg>
